models:
  - name: stg_jaffle_shop_customers
    description: one unique customer per row
    columns:
      - name: customer_id
        description: the primary key for customer table
        data_tests:
          - unique
          - not_null

  - name: stg_jaffle_shop_orders
    description: one unique order per row
    columns:
      - name: order_id
        description: the primary key for order table
        data_tests:
          - unique
          - not_null
      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - completed
                  - shipped
                  - returned
                  - placed
                  - return_pending
      - name: customer_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop_customers')
                field: customer_id

                  